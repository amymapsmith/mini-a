<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mini-a · development tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/iconoir@7.3.0/css/iconoir.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">
    <div class="card">

      <header>
        <div class="brand">
          <span class="brand-name">mini-a</span>
          <span class="brand-tag">in utero</span>
        </div>
        <div class="stats-row">
          <div class="stat">
            <span class="stat-label">estimated arrival</span>
            <span class="stat-value">May 16, 2026</span>
          </div>
          <div class="stat-rule"></div>
          <div class="stat">
            <span class="stat-label">days remaining</span>
            <span class="stat-value" id="daysRemaining">—</span>
          </div>
        </div>
      </header>

      <div class="viz">
        <svg class="ring" viewBox="0 0 220 220">
          <circle class="ring-track" cx="110" cy="110" r="90"/>
          <circle class="ring-fill" cx="110" cy="110" r="90" id="ringFill"/>
        </svg>
        <div class="orb" id="orb">
          <div class="ripple" id="ripple"></div>
          <div class="face" id="face">
            <i id="stageIcon"></i>
          </div>
        </div>
      </div>

      <div class="stage-card">
        <span class="day-chip" id="dayChip">DAY 01</span>
        <h2 id="stageTitle">first signal</h2>
        <p id="stageDesc">A single pulse detected. Something is stirring in the silicon.</p>
      </div>

      <div class="timeline">
        <p class="timeline-label">select a day</p>
        <div class="days" id="days"></div>
        <div class="range">
          <span>May 1</span>
          <span>May 16</span>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
