<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <!-- Tropical leaf: ~70w × 173h, centered at 0,0, tip pointing up -->
    <path id="lf" d="M0,-85 Q38,-15 32,62 Q16,85 0,88 Q-16,85 -32,62 Q-38,-15 0,-85Z"/>
    <!-- Narrow leaf: ~44w × 133h -->
    <path id="ln" d="M0,-65 Q22,-8 18,48 Q8,66 0,68 Q-8,66 -18,48 Q-22,-8 0,-65Z"/>
    <!-- Palm blade: base at 0,0, tip pointing up -->
    <path id="pb" d="M0,0 Q10,-35 6,-90 Q0,-100 -4,-88 Q-6,-32 0,0Z"/>
  </defs>

  <!-- ── Upper-left cluster ── -->
  <g transform="translate(72,118) rotate(-32)">
    <use href="#lf" fill="#2a5420" opacity="0.16"/>
    <line x1="0" y1="-85" x2="0" y2="88" stroke="#1a3e15" stroke-width="1.5" opacity="0.18"/>
  </g>
  <g transform="translate(28,72) rotate(-68)" fill="#3a7030" opacity="0.12">
    <use href="#ln"/>
  </g>

  <!-- ── Upper-right cluster ── -->
  <g transform="translate(418,88) rotate(28)">
    <use href="#lf" fill="#3a7030" opacity="0.14"/>
    <line x1="0" y1="-85" x2="0" y2="88" stroke="#2a5420" stroke-width="1.5" opacity="0.18"/>
  </g>
  <g transform="translate(462,52) rotate(58)" fill="#4a8838" opacity="0.11">
    <use href="#ln"/>
  </g>

  <!-- ── Palm frond: upper-center ── -->
  <g transform="translate(240,14)" fill="#2a5420" opacity="0.12">
    <use href="#pb" transform="rotate(-65)"/>
    <use href="#pb" transform="rotate(-45)"/>
    <use href="#pb" transform="rotate(-25)"/>
    <use href="#pb" transform="rotate(-5)"/>
    <use href="#pb" transform="rotate(15)"/>
    <use href="#pb" transform="rotate(35)"/>
    <use href="#pb" transform="rotate(55)"/>
  </g>

  <!-- ── Right-center ── -->
  <g transform="translate(468,248) rotate(-22)" fill="#4a8838" opacity="0.10">
    <use href="#lf"/>
  </g>

  <!-- ── Lower-left cluster ── -->
  <g transform="translate(58,328) rotate(22)">
    <use href="#lf" fill="#3a7030" opacity="0.15"/>
    <line x1="0" y1="-85" x2="0" y2="88" stroke="#2a5420" stroke-width="1.5" opacity="0.18"/>
  </g>
  <g transform="translate(118,368) rotate(-20)" fill="#4a8838" opacity="0.12">
    <use href="#ln"/>
  </g>

  <!-- ── Lower-right cluster ── -->
  <g transform="translate(398,342) rotate(-38)">
    <use href="#lf" fill="#2a5420" opacity="0.15"/>
    <line x1="0" y1="-85" x2="0" y2="88" stroke="#1a3e15" stroke-width="1.5" opacity="0.18"/>
  </g>

  <!-- ── Scattered accents ── -->
  <g fill="#3a7030" opacity="0.09">
    <g transform="translate(195,192) rotate(78)"><use href="#ln"/></g>
    <g transform="translate(162,30) rotate(38)"><use href="#ln"/></g>
    <g transform="translate(285,355) rotate(-28)"><use href="#ln"/></g>
    <g transform="translate(342,168) rotate(62)"><use href="#ln"/></g>
  </g>

  <!-- ── Edge bleeds (aid tiling continuity) ── -->
  <g transform="translate(-18,205) rotate(15)" fill="#3a7030" opacity="0.11">
    <use href="#ln"/>
  </g>
  <g transform="translate(508,298) rotate(-35)" fill="#2a5420" opacity="0.11">
    <use href="#ln"/>
  </g>
  <g transform="translate(200,418) rotate(5)" fill="#4a8838" opacity="0.10">
    <use href="#ln"/>
  </g>
  <g transform="translate(322,-22) rotate(-15)" fill="#2a5420" opacity="0.10">
    <use href="#ln"/>
  </g>
</svg>
